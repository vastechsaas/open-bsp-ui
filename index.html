<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/SocialConnectSmall.png" />
    <link rel="apple-touch-icon" href="/SocialConnectSmall.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#cb6441" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />

    <title>Social Connect - WhatsApp interface</title>
    <meta
      name="description"
      content="A self-hostable, multi-tenant WhatsApp interface."
    />

    <!-- Open Graph (used by WhatsApp, Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Social Connect" />
    <meta
      property="og:title"
      content="Social Connect - WhatsApp interface"
    />
    <meta
      property="og:description"
      content="A self-hostable, multi-tenant WhatsApp interface."
    />
    <meta
      property="og:image"
      content="/SocialConnectLarge.png"
    />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="Social Connect logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Social Connect - WhatsApp interface"
    />
    <meta
      name="twitter:description"
      content="A self-hostable, multi-tenant WhatsApp interface."
    />
    <meta
      name="twitter:image"
      content="/SocialConnectLarge.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
